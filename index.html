<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarath Chandra | Computer Vision & AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark nav / header */
            --dark-bg:      #070b14;
            --dark-border:  #1a2744;
            /* Light content */
            --bg:           #f1f5f9;
            --surface:      #ffffff;
            --border:       #e2e8f0;
            /* Accents */
            --primary:      #00b4d8;
            --primary-dim:  rgba(0,180,216,0.1);
            --primary-glow: 0 0 24px rgba(0,180,216,0.22);
            --green:        #10b981;
            --amber:        #f59e0b;
            --red:          #ef4444;
            /* Text (light area) */
            --text:         #1e293b;
            --text-dim:     #475569;
            --text-muted:   #94a3b8;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── HERO HEADER ─── */
        #heroHeader {
            position: relative;
            background: linear-gradient(180deg, #040810 0%, #0b1527 100%);
            border-bottom: 1px solid var(--dark-border);
            padding: 64px 20px 52px;
            text-align: center;
            overflow: hidden;
            /* Collapse animation */
            max-height: 700px;
            opacity: 1;
            transition:
                max-height 0.5s cubic-bezier(0.4,0,0.2,1),
                opacity    0.3s ease,
                padding    0.4s ease;
        }

        #heroHeader::before {
            content: '';
            position: absolute;
            top: -80px; left: 50%;
            transform: translateX(-50%);
            width: 700px; height: 400px;
            background: radial-gradient(ellipse, rgba(0,180,216,0.07) 0%, transparent 68%);
            pointer-events: none;
        }

        #heroHeader::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.4;
        }

        /* Collapsed state */
        body.maximized #heroHeader {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #e2e8f0 25%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.92rem;
            font-weight: 500;
            color: #4b5e7a;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .contact-bar {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .contact-link {
            color: #94a3b8;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            background: rgba(255,255,255,0.025);
            transition: all 0.2s ease;
        }

        .contact-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-dim);
            box-shadow: var(--primary-glow);
        }

        .resume-btn {
            border-color: rgba(239,68,68,0.4);
            color: #f87171;
            background: rgba(239,68,68,0.07);
            font-weight: 600;
        }

        .resume-btn:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(239,68,68,0.13);
            box-shadow: 0 0 20px rgba(239,68,68,0.18);
        }

        /* Hero tabs */
        .hero-tabs-wrap {
            margin-top: 38px;
            display: flex;
            justify-content: center;
        }

        .tabs {
            display: inline-flex;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #4b5e7a;
            padding: 10px 28px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .tab-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }

        .tab-btn.active {
            background: var(--primary);
            color: #040d18;
            font-weight: 700;
            box-shadow: 0 0 16px rgba(0,180,216,0.3);
        }

        /* ─── STICKY NAV (shown in maximized mode) ─── */
        .sticky-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 200;
            height: 58px;
            background: #070b14;
            border-bottom: 1px solid var(--dark-border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transform: translateY(-100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        body.maximized .sticky-nav {
            transform: translateY(0);
        }

        .sticky-logo {
            font-size: 1rem;
            font-weight: 700;
            color: #e2e8f0;
            white-space: nowrap;
            letter-spacing: -0.01em;
            flex-shrink: 0;
        }

        .sticky-tabs {
            display: inline-flex;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            padding: 3px;
            gap: 3px;
        }

        .sticky-tab-btn {
            background: transparent;
            border: none;
            color: #4b5e7a;
            padding: 7px 20px;
            cursor: pointer;
            border-radius: 7px;
            font-size: 0.85rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .sticky-tab-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }

        .sticky-tab-btn.active {
            background: var(--primary);
            color: #040d18;
            font-weight: 700;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .back-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* ─── CONTENT ─── */
        .container {
            max-width: 900px;
            margin: 48px auto;
            padding: 0 24px;
            transition: padding-top 0.35s ease;
        }

        body.maximized .container {
            padding-top: calc(58px + 32px);
        }

        .section { display: none; }
        .section.active {
            display: block;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* ─── CARDS (light) ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 6px 28px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,180,216,0.12);
            transform: translateY(-2px);
        }

        .card-header {
            padding: 20px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            user-select: none;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 9px;
            flex-wrap: wrap;
        }

        .cat-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .cat-cv     { background: rgba(0,180,216,0.08);   color: #0891b2; border: 1px solid rgba(0,180,216,0.2); }
        .cat-audio  { background: rgba(124,58,237,0.07);  color: #7c3aed; border: 1px solid rgba(124,58,237,0.2); }
        .cat-edge   { background: rgba(217,119,6,0.08);   color: #d97706; border: 1px solid rgba(217,119,6,0.2); }
        .cat-fusion { background: rgba(5,150,105,0.08);   color: #059669; border: 1px solid rgba(5,150,105,0.2); }
        .cat-threat { background: rgba(220,38,38,0.07);   color: #dc2626; border: 1px solid rgba(220,38,38,0.18); }

        .status-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.63rem;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-complete { color: #059669; }
        .status-progress { color: #d97706; }

        .status-dot-sm {
            width: 5px; height: 5px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-complete .status-dot-sm { background: #10b981; box-shadow: 0 0 4px #10b981; }
        .status-progress .status-dot-sm { background: #f59e0b; animation: blink 1.8s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .card-info { flex: 1; min-width: 0; }

        .card-info h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .card-tags span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.67rem;
            color: var(--text-muted);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 3px 9px;
            border-radius: 4px;
        }

        .card-arrow {
            color: var(--text-muted);
            font-size: 1rem;
            flex-shrink: 0;
            transition: transform 0.2s, color 0.2s;
        }

        .card:hover .card-arrow {
            transform: translateX(3px);
            color: var(--primary);
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4,8,16,0.85);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-panel {
            background: var(--surface);
            border-radius: 18px;
            width: 100%;
            max-width: 880px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(20px) scale(0.98);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 30px 90px rgba(0,0,0,0.5);
        }

        .modal-overlay.open .modal-panel {
            transform: translateY(0) scale(1);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            background: rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .modal-close:hover { background: var(--red); color: white; border-color: var(--red); }

        .modal-media-wrap {
            width: 100%;
            height: 400px;
            background: #0a0f1a;
            border-radius: 18px 18px 0 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-media-wrap video,
        .modal-media-wrap img,
        .modal-media-wrap iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .modal-media-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: #2a3a5c;
        }

        .modal-media-placeholder svg { opacity: 0.4; }

        /* ─── VIDEO GALLERY TABS ─── */
        .media-gallery { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .media-gallery-tabs {
            display: flex;
            gap: 6px;
            padding: 10px 14px 0;
            background: #0a0f1a;
            flex-shrink: 0;
        }
        .media-gallery-tab {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid #1a2744;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all .18s;
        }
        .media-gallery-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .media-gallery-video { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
        .media-gallery-video video { width: 100%; height: 100%; object-fit: contain; display: block; }

        .modal-media-placeholder span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            opacity: 0.5;
        }

        .modal-body {
            padding: 28px 32px 36px;
        }

        .modal-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .modal-body h2 {
            font-size: 1.55rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-tags span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .modal-desc p {
            color: var(--text-dim);
            line-height: 1.78;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .modal-desc ul {
            color: var(--text-dim);
            line-height: 1.78;
            padding-left: 18px;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .modal-desc li { margin-bottom: 6px; }
        .modal-desc strong { color: var(--text); font-weight: 600; }
        .modal-desc em { color: var(--text-muted); }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 36px 20px;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .sticky-logo { display: none; }
            .tab-btn, .sticky-tab-btn { padding: 9px 14px; font-size: 0.82rem; }
            h1 { font-size: 2rem; }
            .modal-media-wrap { height: 220px; }
            .modal-body { padding: 20px; }
        }
    </style>
</head>

    <script>
        const researchData = [
            {
                title: "Anomaly Detection: Pickpocketing",
                category: "cat-cv",
                categoryLabel: "Computer Vision",
                status: "complete",
                tags: ["Decision Fusion", "Optical Flow", "YOLOv8", "Anomaly Detection"],
                mediaUrl: "videos/PP_fixed.mp4",
                mediaType: "video",
                description: `
                    <p><strong>Goal:</strong> Detect subtle theft actions in crowded surveillance feeds.</p>
                    <p>A dual-stream fusion model analyzes two independent signals simultaneously:</p>
                    <ul>
                        <li><strong>Spatial Stream:</strong> Detects close proximity between individuals using YOLO-based person detection.</li>
                        <li><strong>Temporal Stream:</strong> Identifies rapid localized hand movements via Optical Flow vectors.</li>
                    </ul>
                    <p>An alert fires only when <strong>high proximity AND rapid localized motion</strong> occur together — minimizing false positives in busy scenes.</p>
                `
            },
            {
                title: "Anomaly Detection: Abandoned Object",
                category: "cat-cv",
                categoryLabel: "Computer Vision",
                status: "complete",
                tags: ["Object Tracking", "DeepSORT", "YOLOv8", "Euclidean Distance"],
                mediaUrl: "videos/AB_1_LL_fixed.mp4",
                mediaType: "video",
                description: `
                    <p><strong>Goal:</strong> Identify luggage left unattended in public spaces.</p>
                    <p>DeepSORT assigns a persistent unique ID to every person and object in frame. The system continuously tracks the Euclidean distance between each bag and its last associated owner. If that distance exceeds <strong>3 meters for more than 30 seconds</strong>, the object is flagged as abandoned and an alert is raised.</p>
                `
            },
            {
                title: "Multi-Sensor Image Fusion",
                category: "cat-fusion",
                categoryLabel: "Multi-modal",
                status: "progress",
                tags: ["IR + RGB Fusion", "Multi-modal", "Low-visibility", "Sensor Fusion"],
                mediaUrl: "",
                mediaType: "none",
                description: `
                    <p>Fusing infrared and visible-spectrum imagery to boost detection performance in degraded visibility — targeting night conditions, fog, and smoke-filled environments.</p>
                    <p><em>In development. Details coming soon.</em></p>
                `
            },
            {
                title: "Concealed Firearm Detection",
                category: "cat-threat",
                categoryLabel: "Threat Detection",
                status: "progress",
                tags: ["Security CV", "Object Detection", "Passive Screening", "Surveillance"],
                mediaType: "gallery",
                mediaGallery: [
                    { url: "videos/demo_set2_handgun_2.mp4", label: "Handgun – Set 2" },
                    { url: "videos/demo_set4_handgun_1.mp4", label: "Handgun – Set 4" },
                    { url: "videos/demo_set4_nogun_1.mp4",   label: "No Gun – Set 4" }
                ],
                description: `
                    <p><strong>Goal:</strong> Detect concealed weapons in crowded public environments using computer vision — targeting passive, non-invasive screening at high-risk locations.</p>
                    <p>The demos below show the model running across different real-world scenarios:</p>
                    <ul>
                        <li><strong>Handgun – Set 2 &amp; Set 4:</strong> Detection triggered with bounding-box overlays when a firearm is identified.</li>
                        <li><strong>No Gun – Set 4:</strong> Clean inference pass with no false positives in a benign scene.</li>
                    </ul>
                    <p><em>Full write-up and model details coming soon.</em></p>
                `
            }
        ];

        const projectData = [
            {
                title: "Urban Sound Classification & Enhancement",
                category: "cat-audio",
                categoryLabel: "Audio ML",
                status: "complete",
                tags: ["PCEN", "SepFormer", "XGBoost", "UrbanSound8K"],
                mediaUrl: "",
                mediaType: "none",
                description: `
                    <p>A pipeline to detect and classify safety-critical sounds (gunshots, sirens) in noisy urban environments.</p>
                    <ul>
                        <li><strong>Enhancement:</strong> PCEN suppresses background city rumble and amplifies transient events.</li>
                        <li><strong>Separation:</strong> SepFormer isolates human voice from environmental event sounds.</li>
                        <li><strong>Result:</strong> +15% classification accuracy on the UrbanSound8K benchmark.</li>
                    </ul>
                    <p><em>Demo video coming soon.</em></p>
                `
            },
            {
                title: "License Plate Recognition (LPR)",
                category: "cat-edge",
                categoryLabel: "Edge AI",
                status: "complete",
                tags: ["Edge Deployment", "OCR", "React UI", "Lightweight Detection"],
                mediaUrl: "images/lpr_demo.jpeg",
                mediaType: "image",
                description: `
                    <p>A real-time LPR system built for edge deployment. A lightweight detection model crops license plates from the frame and routes them to an OCR engine for character extraction.</p>
                    <p><strong>Result:</strong> 94% recognition accuracy across variable lighting conditions.</p>
                `
            }
        ];

        // Keyed store so openModal can look up items by section + index
        const dataStore = {
            'research': researchData,
            'projects': projectData
        };

        function renderMedia(item, inModal = false) {
            if (item.mediaType === 'gallery' && item.mediaGallery && item.mediaGallery.length) {
                if (!inModal) return '';
                const tabs = item.mediaGallery.map((v, i) =>
                    `<button class="media-gallery-tab${i === 0 ? ' active' : ''}" onclick="switchGalleryTab(this, '${v.url}')">${v.label}</button>`
                ).join('');
                return `<div class="media-gallery">
                    <div class="media-gallery-tabs">${tabs}</div>
                    <div class="media-gallery-video">
                        <video id="galleryVideo" controls preload="metadata">
                            <source src="${item.mediaGallery[0].url}" type="video/mp4">
                        </video>
                    </div>
                </div>`;
            }
            if (item.mediaType === 'none' || !item.mediaUrl) {
                if (!inModal) return '';
                return `<div class="modal-media-placeholder">
                    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                    <span>DEMO COMING SOON</span>
                </div>`;
            }
            if (item.mediaType === 'image') {
                return `<img src="${item.mediaUrl}" alt="${item.title}" style="width:100%;height:100%;object-fit:contain;display:block;">`;
            }
            if (item.mediaUrl.includes('youtube')) {
                return `<iframe src="${item.mediaUrl}" frameborder="0" allowfullscreen style="width:100%;height:100%;display:block;"></iframe>`;
            }
            return `<video controls preload="metadata" style="width:100%;height:100%;object-fit:contain;display:block;">
                <source src="${item.mediaUrl}" type="video/mp4">
            </video>`;
        }

        function switchGalleryTab(btn, url) {
            btn.closest('.media-gallery-tabs').querySelectorAll('.media-gallery-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const vid = document.getElementById('galleryVideo');
            vid.pause();
            vid.querySelector('source').src = url;
            vid.load();
        }

        function renderCards(data, containerId, sectionTitle, sectionKey) {
            const container = document.getElementById(containerId);
            container.innerHTML =
                `<div class="section-label">${sectionTitle}</div>` +
                data.map((item, index) => `
                    <div class="card" onclick="openModal('${sectionKey}', ${index})">
                        <div class="card-header">
                            <div class="card-info">
                                <div class="card-meta">
                                    <span class="cat-badge ${item.category}">${item.categoryLabel}</span>
                                    <span class="status-pill ${item.status === 'complete' ? 'status-complete' : 'status-progress'}">
                                        <span class="status-dot-sm"></span>
                                        ${item.status === 'complete' ? 'Complete' : 'In Progress'}
                                    </span>
                                </div>
                                <h3>${item.title}</h3>
                                <div class="card-tags">
                                    ${item.tags.map(t => `<span>${t}</span>`).join('')}
                                </div>
                            </div>
                            <span class="card-arrow">›</span>
                        </div>
                    </div>
                `).join('');
        }

        function openModal(sectionKey, index) {
            const item = dataStore[sectionKey][index];
            document.getElementById('modalMedia').innerHTML =
                `<div class="modal-media-wrap">${renderMedia(item, true)}</div>`;
            document.getElementById('modalMeta').innerHTML =
                `<span class="cat-badge ${item.category}">${item.categoryLabel}</span>
                 <span class="status-pill ${item.status === 'complete' ? 'status-complete' : 'status-progress'}">
                     <span class="status-dot-sm"></span>
                     ${item.status === 'complete' ? 'Complete' : 'In Progress'}
                 </span>`;
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalTags').innerHTML =
                item.tags.map(t => `<span>${t}</span>`).join('');
            document.getElementById('modalDesc').innerHTML = item.description;

            document.body.style.overflow = 'hidden';
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.body.style.overflow = '';
            document.querySelectorAll('#modalMedia video').forEach(v => v.pause());
        }

        function handleOverlayClick(e) {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        function switchTab(tabName) {
            // Sync all tab buttons (both hero and sticky)
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
            // Show section
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabName + '-section').classList.add('active');
            // Enter maximized mode
            document.body.classList.add('maximized');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exitMaximize() {
            document.body.classList.remove('maximized');
        }

        renderCards(researchData, 'research-section', 'RESEARCH WORK', 'research');
        renderCards(projectData,  'projects-section',  'PROJECTS',      'projects');
    </script>
</body>
</html>

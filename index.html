<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarath Chandra | Computer Vision & AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #070b14;
            --surface:      #0d1321;
            --surface-2:    #0a1020;
            --border:       #1a2744;
            --border-hover: rgba(0, 180, 216, 0.4);
            --primary:      #00b4d8;
            --primary-dim:  rgba(0, 180, 216, 0.1);
            --primary-glow: 0 0 28px rgba(0, 180, 216, 0.22);
            --amber:        #f59e0b;
            --amber-dim:    rgba(245, 158, 11, 0.1);
            --green:        #10b981;
            --red:          #ef4444;
            --purple:       #a78bfa;
            --text:         #e2e8f0;
            --text-dim:     #94a3b8;
            --text-muted:   #4b5e7a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Dot-grid texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(rgba(0, 180, 216, 0.055) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─────────────── HEADER ─────────────── */
        header {
            position: relative;
            background: linear-gradient(180deg, #040810 0%, #0b1527 100%);
            border-bottom: 1px solid var(--border);
            padding: 64px 20px 52px;
            text-align: center;
            overflow: hidden;
            z-index: 1;
        }

        /* Radial glow behind name */
        header::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 420px;
            background: radial-gradient(ellipse, rgba(0,180,216,0.07) 0%, transparent 68%);
            pointer-events: none;
        }

        /* Thin scan line at bottom of header */
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .system-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--green);
            background: rgba(16,185,129,0.07);
            border: 1px solid rgba(16,185,129,0.22);
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 26px;
        }

        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 7px var(--green);
            animation: blink 2.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #e2e8f0 25%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Contact links */
        .contact-bar {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .contact-link {
            color: var(--text-dim);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            background: rgba(255,255,255,0.025);
            transition: all 0.2s ease;
        }

        .contact-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-dim);
            box-shadow: var(--primary-glow);
        }

        .contact-link svg { flex-shrink: 0; }

        .resume-btn {
            border-color: rgba(239,68,68,0.45);
            color: #f87171;
            background: rgba(239,68,68,0.07);
            font-weight: 600;
        }

        .resume-btn:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(239,68,68,0.13);
            box-shadow: 0 0 24px rgba(239,68,68,0.18);
        }

        /* Tab selector */
        .tabs-wrapper {
            margin-top: 38px;
            display: flex;
            justify-content: center;
        }

        .tabs {
            display: inline-flex;
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 28px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            background: var(--primary);
            color: #040d18;
            font-weight: 700;
            box-shadow: 0 0 16px rgba(0,180,216,0.3);
        }

        /* ─────────────── MAIN ─────────────── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 48px auto;
            padding: 0 20px;
        }

        .section { display: none; }
        .section.active {
            display: block;
            animation: fadeUp 0.35s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* ─────────────── CARDS ─────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 14px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,180,216,0.08);
        }

        .card.open {
            border-color: rgba(0,180,216,0.55);
            box-shadow: var(--primary-glow), 0 4px 28px rgba(0,0,0,0.5);
        }

        .card-header {
            padding: 20px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            user-select: none;
        }

        .card-header:hover { background: rgba(255,255,255,0.015); }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 9px;
            flex-wrap: wrap;
        }

        /* Category badge */
        .cat-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .cat-cv        { background: rgba(0,180,216,0.1);   color: var(--primary); border: 1px solid rgba(0,180,216,0.22); }
        .cat-audio     { background: rgba(167,139,250,0.1); color: var(--purple);  border: 1px solid rgba(167,139,250,0.22); }
        .cat-edge      { background: rgba(245,158,11,0.1);  color: var(--amber);   border: 1px solid rgba(245,158,11,0.22); }
        .cat-fusion    { background: rgba(16,185,129,0.1);  color: #34d399;        border: 1px solid rgba(16,185,129,0.22); }
        .cat-threat    { background: rgba(239,68,68,0.1);   color: #f87171;        border: 1px solid rgba(239,68,68,0.22); }

        /* Status indicator */
        .status-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.63rem;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-complete { color: var(--green); }
        .status-progress { color: var(--amber); }

        .status-dot-sm {
            width: 5px; height: 5px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-complete .status-dot-sm { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .status-progress .status-dot-sm { background: var(--amber); box-shadow: 0 0 5px var(--amber); animation: blink 1.8s infinite; }

        .card-info { flex: 1; min-width: 0; }

        .card-info h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .card-tags span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.67rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 3px 9px;
            border-radius: 4px;
        }

        .chevron {
            color: var(--text-muted);
            font-size: 0.8rem;
            flex-shrink: 0;
            transition: transform 0.3s ease, color 0.2s;
        }

        .card.open .chevron {
            transform: rotate(180deg);
            color: var(--primary);
        }

        /* Accordion body — max-height transition */
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.open .card-body { max-height: 1200px; }

        .card-body-inner {
            padding: 22px;
            background: var(--surface-2);
            border-top: 1px solid var(--border);
        }

        /* Media container */
        .media-wrap {
            width: 100%;
            height: 340px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .media-wrap video,
        .media-wrap img,
        .media-wrap iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Description typography */
        .card-body-inner p {
            color: var(--text-dim);
            line-height: 1.75;
            font-size: 0.93rem;
            margin-bottom: 10px;
        }

        .card-body-inner ul {
            color: var(--text-dim);
            line-height: 1.75;
            padding-left: 18px;
            font-size: 0.93rem;
            margin-bottom: 10px;
        }

        .card-body-inner li { margin-bottom: 5px; }
        .card-body-inner strong { color: var(--text); font-weight: 600; }
        .card-body-inner em { color: var(--text-muted); }

        /* ─────────────── FOOTER ─────────────── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 36px 20px;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        /* ─────────────── RESPONSIVE ─────────────── */
        @media (max-width: 580px) {
            .tabs { width: 100%; }
            .tab-btn { flex: 1; justify-content: center; padding: 10px 12px; font-size: 0.82rem; }
            h1 { font-size: 2rem; }
            .card-header { padding: 16px 16px; }
            .card-body-inner { padding: 16px; }
            .media-wrap { height: 220px; }
        }
    </style>
</head>
<body>

        </div>

        <h1>Sarath Chandra</h1>

            </a>
        </div>

        <div class="tabs-wrapper">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('research', this)">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Research
                </button>
                <button class="tab-btn" onclick="switchTab('projects', this)">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    Projects
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="research-section" class="section active"></div>
        <div id="projects-section" class="section"></div>
    </div>

    <footer>// SARATH CHANDRA &nbsp;·&nbsp; COMPUTER VISION & AI &nbsp;·&nbsp; 2025</footer>

    <script>
        const researchData = [
            {
                title: "Anomaly Detection: Pickpocketing",
                category: "cat-cv",
                categoryLabel: "Computer Vision",
                status: "complete",
                tags: ["Decision Fusion", "Optical Flow", "YOLOv8", "Anomaly Detection"],
                mediaUrl: "videos/PP_fixed.mp4",
                mediaType: "video",
                description: `
                    <p><strong>Goal:</strong> Detect subtle theft actions in crowded surveillance feeds.</p>
                    <p>A dual-stream fusion model analyzes two independent signals simultaneously:</p>
                    <ul>
                        <li><strong>Spatial Stream:</strong> Detects close proximity between individuals using YOLO-based person detection.</li>
                        <li><strong>Temporal Stream:</strong> Identifies rapid localized hand movements via Optical Flow vectors.</li>
                    </ul>
                    <p>An alert fires only when <strong>high proximity AND rapid localized motion</strong> occur together — minimizing false positives in busy scenes.</p>
                `
            },
            {
                title: "Anomaly Detection: Abandoned Object",
                category: "cat-cv",
                categoryLabel: "Computer Vision",
                status: "complete",
                tags: ["Object Tracking", "DeepSORT", "YOLOv8", "Euclidean Distance"],
                mediaUrl: "videos/AB_1_LL_fixed.mp4",
                mediaType: "video",
                description: `
                    <p><strong>Goal:</strong> Identify luggage left unattended in public spaces.</p>
                    <p>DeepSORT assigns a persistent unique ID to every person and object in frame. The system continuously tracks the Euclidean distance between each bag and its last associated owner. If that distance exceeds <strong>3 meters for more than 30 seconds</strong>, the object is flagged as abandoned and an alert is raised.</p>
                `
            }
        ];

        const projectData = [
            {
                title: "Urban Sound Classification & Enhancement",
                category: "cat-audio",
                categoryLabel: "Audio ML",
                status: "complete",
                tags: ["PCEN", "SepFormer", "XGBoost", "UrbanSound8K"],
                mediaUrl: "",
                mediaType: "none",
                description: `
                    <p>A pipeline to detect and classify safety-critical sounds (gunshots, sirens) in noisy urban environments.</p>
                    <ul>
                        <li><strong>Enhancement:</strong> PCEN suppresses background city rumble and amplifies transient events.</li>
                        <li><strong>Separation:</strong> SepFormer isolates human voice from environmental event sounds.</li>
                        <li><strong>Result:</strong> +15% classification accuracy on the UrbanSound8K benchmark.</li>
                    </ul>
                    <p><em>Demo video coming soon.</em></p>
                `
            },
            {
                title: "License Plate Recognition (LPR)",
                category: "cat-edge",
                categoryLabel: "Edge AI",
                status: "complete",
                tags: ["Edge Deployment", "OCR", "React UI", "Lightweight Detection"],
                mediaUrl: "images/lpr_demo.jpeg",
                mediaType: "image",
                description: `
                    <p>A real-time LPR system built for edge deployment. A lightweight detection model crops license plates from the frame and routes them to an OCR engine for character extraction.</p>
                    <p><strong>Result:</strong> 94% recognition accuracy across variable lighting conditions.</p>
                `
            },
            {
                title: "Multi-Sensor Image Fusion",
                category: "cat-fusion",
                categoryLabel: "Multi-modal",
                status: "progress",
                tags: ["IR + RGB Fusion", "Multi-modal", "Low-visibility", "Sensor Fusion"],
                mediaUrl: "",
                mediaType: "none",
                description: `
                    <p>Fusing infrared and visible-spectrum imagery to boost detection performance in degraded visibility — targeting night conditions, fog, and smoke-filled environments.</p>
                    <p><em>In development. Details coming soon.</em></p>
                `
            },
            {
                title: "Concealed Firearm Detection",
                category: "cat-threat",
                categoryLabel: "Threat Detection",
                status: "progress",
                tags: ["Security CV", "Object Detection", "Passive Screening", "Surveillance"],
                mediaUrl: "",
                mediaType: "none",
                description: `
                    <p>Detecting concealed weapons in crowded public environments using computer vision — targeting passive, non-invasive screening at high-risk locations.</p>
                    <p><em>In development. Details coming soon.</em></p>
                `
            }
        ];

        function renderMedia(item) {
            if (item.mediaType === 'none' || !item.mediaUrl) return '';
            if (item.mediaType === 'image') {
                return `<div class="media-wrap" style="background:#000;">
                    <img src="${item.mediaUrl}" alt="${item.title}">
                </div>`;
            }
            if (item.mediaUrl.includes('youtube')) {
                return `<div class="media-wrap">
                    <iframe src="${item.mediaUrl}" frameborder="0" allowfullscreen></iframe>
                </div>`;
            }
            return `<div class="media-wrap">
                <video controls preload="metadata">
                    <source src="${item.mediaUrl}" type="video/mp4">
                </video>
            </div>`;
        }

        function renderCards(data, containerId, sectionTitle) {
            const container = document.getElementById(containerId);
            container.innerHTML =
                `<div class="section-label">${sectionTitle}</div>` +
                data.map(item => `
                    <div class="card" onclick="toggleCard(this)">
                        <div class="card-header">
                            <div class="card-info">
                                <div class="card-meta">
                                    <span class="cat-badge ${item.category}">${item.categoryLabel}</span>
                                    <span class="status-pill ${item.status === 'complete' ? 'status-complete' : 'status-progress'}">
                                        <span class="status-dot-sm"></span>
                                        ${item.status === 'complete' ? 'Complete' : 'In Progress'}
                                    </span>
                                </div>
                                <h3>${item.title}</h3>
                                <div class="card-tags">
                                    ${item.tags.map(t => `<span>${t}</span>`).join('')}
                                </div>
                            </div>
                            <span class="chevron">▼</span>
                        </div>
                        <div class="card-body">
                            <div class="card-body-inner">
                                ${renderMedia(item)}
                                ${item.description}
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        function toggleCard(card) {
            const isOpen = card.classList.contains('open');
            card.parentElement.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
            if (!isOpen) card.classList.add('open');
        }

        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabName + '-section').classList.add('active');
        }

        renderCards(researchData, 'research-section', 'RESEARCH');
        renderCards(projectData,  'projects-section',  'PROJECTS');
    </script>
</body>
